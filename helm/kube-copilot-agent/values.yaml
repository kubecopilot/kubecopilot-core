# Default values for kube-copilot-agent Helm chart.

## @section Global
nameOverride: ""
fullnameOverride: ""

## Namespace to deploy into. Creates the namespace if it doesn't exist.
namespace: kube-copilot-agent
createNamespace: true

## @section Operator image
image:
  repository: quay.io/gfontana/kube-copilot-agent
  tag: "v1.0"
  pullPolicy: Always

## @section Operator deployment
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

## @section Agent defaults
## Default agent container image used when a KubeCopilotAgent does not specify .spec.image
agentImage:
  repository: quay.io/gfontana/kube-github-copilot-agent-server
  tag: "v1.0"

## @section RBAC
rbac:
  ## Set to false to skip ClusterRole/ClusterRoleBinding creation (manage RBAC yourself)
  create: true

## @section ServiceAccount
serviceAccount:
  ## Set to false to use an existing service account
  create: true
  name: ""
  annotations: {}

## @section Leader election
leaderElect: true

## @section CRD installation
## Set to false to skip CRD installation (e.g. if you manage CRDs separately)
installCRDs: true

## @section OpenTelemetry tracing
## Configure OTLP tracing for the operator and agent pods.
## Tracing is disabled by default. Set enabled: true and configure the endpoint
## to export traces to Jaeger, Grafana Tempo, or any OTLP-compatible backend.
tracing:
  ## Enable OpenTelemetry tracing
  enabled: false
  ## OTLP collector endpoint.
  ## Use gRPC format (e.g. jaeger-collector:4317) or HTTP format
  ## (e.g. http://otel-collector:4318).
  ## When the endpoint starts with http:// or https://, the HTTP exporter is
  ## used; otherwise gRPC is assumed.
  endpoint: ""
  ## Service name reported in traces for the operator.
  ## Defaults to "kube-copilot-agent" when empty.
  operatorServiceName: ""
  ## Service name reported in traces for the agent server pods.
  ## Defaults to "kube-copilot-agent-server" when empty.
  agentServiceName: ""
