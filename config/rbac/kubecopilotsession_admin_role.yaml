# This rule is not used by the project kube-copilot-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over agent.kubecopilot.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-copilot-agent
    app.kubernetes.io/managed-by: kustomize
  name: kubecopilotsession-admin-role
rules:
- apiGroups:
  - agent.kubecopilot.io
  resources:
  - kubecopilotsessions
  verbs:
  - '*'
- apiGroups:
  - agent.kubecopilot.io
  resources:
  - kubecopilotsessions/status
  verbs:
  - get
