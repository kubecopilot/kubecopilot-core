apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-copilot-ui.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-copilot-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kube-copilot-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-copilot-ui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kube-copilot-ui.serviceAccountName" . }}
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: WEBUI_NAMESPACE
              value: {{ .Values.operatorNamespace | quote }}
            - name: WEBUI_COMMAND_TIMEOUT
              value: {{ .Values.commandTimeout | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
