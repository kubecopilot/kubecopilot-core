apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-copilot-ui
  namespace: kube-copilot-agent
rules:
  - apiGroups: ["kubecopilot.io"]
    resources: ["kubecopilotagents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubecopilot.io"]
    resources: ["kubecopilotsends"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["kubecopilot.io"]
    resources: ["kubecopilotresponses"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["kubecopilot.io"]
    resources: ["kubecopilotchunks"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["kubecopilot.io"]
    resources: ["kubecopilotcancels"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-copilot-ui
  namespace: kube-copilot-agent
subjects:
  - kind: ServiceAccount
    name: kube-copilot-ui
    namespace: kube-copilot-agent
roleRef:
  kind: Role
  name: kube-copilot-ui
  apiGroup: rbac.authorization.k8s.io
