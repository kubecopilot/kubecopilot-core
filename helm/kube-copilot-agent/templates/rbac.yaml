{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-copilot-agent.fullname" . }}-manager-role
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps, secrets]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [persistentvolumeclaims, pods, services]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [kubecopilot.io]
  resources:
  - kubecopilotagents
  - kubecopilotcancels
  - kubecopilotchunks
  - kubecopilotmessages
  - kubecopilotsends
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [kubecopilot.io]
  resources:
  - kubecopilotagents/finalizers
  - kubecopilotmessages/finalizers
  - kubecopilotsends/finalizers
  verbs: [update]
- apiGroups: [kubecopilot.io]
  resources:
  - kubecopilotagents/status
  - kubecopilotcancels/status
  - kubecopilotchunks/status
  - kubecopilotmessages/status
  - kubecopilotsends/status
  verbs: [get, patch, update]
- apiGroups: [kubecopilot.io]
  resources: [kubecopilotresponses]
  verbs: [create, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-copilot-agent.fullname" . }}-manager-rolebinding
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-copilot-agent.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "kube-copilot-agent.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kube-copilot-agent.fullname" . }}-leader-election-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-copilot-agent.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kube-copilot-agent.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "kube-copilot-agent.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
{{- end }}
