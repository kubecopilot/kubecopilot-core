{{- if and (not .Values.githubToken.existingSecret) (not .Values.githubToken.value) }}
{{- fail "Either githubToken.value or githubToken.existingSecret must be set." }}
{{- end }}
{{- if not .Values.githubToken.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "github-copilot-agent.fullname" . }}-github-token
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "github-copilot-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.githubToken.secretKey }}: {{ .Values.githubToken.value | quote }}
{{- end }}
