apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-copilot-agent.webhookServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  selector:
    {{- include "kube-copilot-agent.selectorLabels" . | nindent 4 }}
  ports:
  - name: webhook
    port: 8090
    targetPort: 8090
    protocol: TCP
