apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "kube-copilot-console-plugin.patcherName" . }}
  labels:
    {{- include "kube-copilot-console-plugin.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kube-copilot-console-plugin.patcherName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ template "kube-copilot-console-plugin.patcherServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
