name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please comment to keep
            it open. Thank you for your contributions to KubeCopilot!
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had activity in the last 60 days. It will be closed in 14 days if no further
            activity occurs. If this PR is still relevant, please update it or comment
            to keep it open.
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security'
          exempt-all-milestones: true
