# This rule is not used by the project kube-copilot-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agent.kubecopilot.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-copilot-agent
    app.kubernetes.io/managed-by: kustomize
  name: kubecopilotsession-viewer-role
rules:
- apiGroups:
  - agent.kubecopilot.io
  resources:
  - kubecopilotsessions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agent.kubecopilot.io
  resources:
  - kubecopilotsessions/status
  verbs:
  - get
