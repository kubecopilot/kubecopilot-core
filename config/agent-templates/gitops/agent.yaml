# GitOps Agent
# Inspects Argo CD and Flux resources, checks sync status, and detects drift.
apiVersion: kubecopilot.io/v1
kind: KubeCopilotAgent
metadata:
  name: gitops-agent
  namespace: kube-copilot-agent
spec:
  githubTokenSecretRef:
    name: github-token
  skillsConfigMap: gitops-skills
  agentConfigMap: gitops-agent-md
  storageSize: "1Gi"

  rbac:
    serviceAccountName: gitops-agent-sa

    # Namespace-scoped: read workloads managed by GitOps
    rules:
      - apiGroups: [""]
        resources: ["pods", "services", "configmaps", "events"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["deployments", "replicasets", "statefulsets"]
        verbs: ["get", "list", "watch"]

    # Cluster-scoped: read Argo CD and Flux CRDs
    clusterRules:
      - apiGroups: [""]
        resources: ["namespaces"]
        verbs: ["get", "list"]
      - apiGroups: ["argoproj.io"]
        resources: ["applications", "applicationsets", "appprojects"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["kustomize.toolkit.fluxcd.io"]
        resources: ["kustomizations"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["helm.toolkit.fluxcd.io"]
        resources: ["helmreleases"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["source.toolkit.fluxcd.io"]
        resources: ["gitrepositories", "helmrepositories", "helmcharts"]
        verbs: ["get", "list", "watch"]
